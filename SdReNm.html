<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貼圖轉換所：APNG to GIF (高級渲染版)</title>
    <script src="https://cdn.jsdelivr.net/npm/apng-js@1.1.1/dist/apng-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --line-green: #00c300;
            --accent-gray: #333333;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        .container { 
            background: var(--container-bg); padding: 40px; border-radius: 12px; 
            width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #2a2a2a; text-align: center;
        }
        h1 { color: var(--line-green); margin-bottom: 5px; font-size: 24px; }
        .subtitle { font-size: 14px; color: #888; margin-bottom: 25px; }
        .upload-area {
            border: 2px dashed var(--line-green); border-radius: 10px; padding: 30px; 
            background: rgba(0, 195, 0, 0.05); cursor: pointer; transition: 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover { background: rgba(0, 195, 0, 0.1); }
        .spinner { 
            border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--line-green); 
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; 
            margin: 20px auto; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 16px; line-height: 1.6; color: #b0b0b0; height: 60px; }
        .progress-bar {
            width: 100%; background: var(--accent-gray); height: 8px; 
            border-radius: 4px; margin-top: 15px; overflow: hidden; display: none;
        }
        #progress-fill { width: 0%; height: 100%; background: var(--line-green); transition: width 0.2s ease; }
        #fileInput { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 APNG 高階轉換引擎</h1>
        <div class="subtitle" id="subtitle">支援自動化任務與手動拖曳轉檔</div>
        
        <div class="upload-area" id="upload-area" onclick="document.getElementById('fileInput').click()">
            <h3 style="margin:0; color:var(--text-color);">點擊或拖曳圖片至此</h3>
            <p style="margin-top:10px; color:#aaa; font-size:14px;">支援批次 APNG 轉 GIF (套用去背與影格修復)</p>
            <input type="file" id="fileInput" multiple accept=".png,.apng">
        </div>

        <div id="loader" class="spinner"></div>
        <div id="status"></div>
        <div class="progress-bar" id="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const loader = document.getElementById('loader');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');
        const uploadArea = document.getElementById('upload-area');
        const subtitle = document.getElementById('subtitle');

        // ==== 高級渲染核心精華 ====
        const applyAlphaThreshold = (ctx, width, height) => {
            const imgData = ctx.getImageData(0, 0, width, height);
            const data = imgData.data;
            for (let j = 0; j < data.length; j += 4) {
                if (data[j+3] < 128) {
                    data[j] = 255; data[j+1] = 0; data[j+2] = 255; data[j+3] = 255; 
                } else {
                    data[j+3] = 255; 
                    if (data[j] === 255 && data[j+1] === 0 && data[j+2] === 255) {
                        data[j+1] = 1;
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);
        };

        // ==== 自動化接管模式 (提供給油猴腳本呼叫) ====
        if (location.search.includes('autorun=1')) {
            uploadArea.style.display = 'none';
            subtitle.innerText = '🤖 自動化任務接管中...';
            // 這裡保留乾淨的環境，轉檔邏輯由油猴腳本使用這頁面的資源直接執行
        }

        // ==== 手動轉換模式 ====
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            uploadArea.style.display = 'none';
            loader.style.display = 'block';
            progressBar.style.display = 'block';

            let workerUrl;
            try {
                const res = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js');
                workerUrl = URL.createObjectURL(await res.blob());
            } catch(e) { workerUrl = 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'; }

            const apngParse = (window.apngjs || apngjs).parseAPNG;
            const GIFEngine = window.GIF || GIF;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                statusEl.innerText = `正在轉換 (${i + 1}/${files.length}):\n${file.name}`;
                progressFill.style.width = `${((i + 1) / files.length) * 100}%`;

                try {
                    const buffer = await file.arrayBuffer();
                    const apng = apngParse(buffer);
                    if (apng instanceof Error || !apng.frames) throw new Error("不是有效的 APNG");
                    await apng.createImages();

                    const w = apng.width; const h = apng.height;
                    const gif = new GIFEngine({ workers: 4, quality: 10, width: w, height: h, workerScript: workerUrl, transparent: 0xFF00FF });
                    
                    const compCanvas = document.createElement('canvas'); compCanvas.width = w; compCanvas.height = h;
                    const compCtx = compCanvas.getContext('2d');
                    const gifCanvas = document.createElement('canvas'); gifCanvas.width = w; gifCanvas.height = h;
                    const gifCtx = gifCanvas.getContext('2d');

                    let prevImageData = null;
                    let timeAccumulator = 0;

                    for (let fIdx = 0; fIdx < apng.frames.length; fIdx++) {
                        const frame = apng.frames[fIdx];
                        if (fIdx > 0) {
                            const prevFrame = apng.frames[fIdx - 1];
                            if (prevFrame.disposeOp === 1) compCtx.clearRect(prevFrame.left, prevFrame.top, prevFrame.width, prevFrame.height);
                            else if (prevFrame.disposeOp === 2 && prevImageData) compCtx.putImageData(prevImageData, 0, 0);
                        }
                        if (frame.disposeOp === 2) prevImageData = compCtx.getImageData(0, 0, w, h);
                        if (frame.blendOp === 0) compCtx.clearRect(frame.left, frame.top, frame.width, frame.height);
                        if (frame.imageElement) compCtx.drawImage(frame.imageElement, frame.left, frame.top);
                        
                        gifCtx.clearRect(0, 0, w, h); gifCtx.drawImage(compCanvas, 0, 0);
                        applyAlphaThreshold(gifCtx, w, h);
                        
                        let rawDelay = (typeof frame.delay === 'number' && frame.delay > 0) ? frame.delay : 100;
                        let targetDelay = rawDelay + timeAccumulator;
                        let finalDelay = Math.round(targetDelay / 10) * 10;
                        if (finalDelay < 20) finalDelay = 20;
                        
                        timeAccumulator = targetDelay - finalDelay;
                        if (timeAccumulator > 25) timeAccumulator = 25;
                        if (timeAccumulator < -25) timeAccumulator = -25;

                        gif.addFrame(gifCanvas, { delay: finalDelay, copy: true });
                    }

                    const gifBlob = await new Promise(resolve => { gif.on('finished', resolve); gif.render(); });
                    
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(gifBlob);
                    a.download = file.name.replace('.png', '.gif');
                    a.click();

                } catch(e) { console.error(`${file.name} 轉換失敗:`, e); }
            }

            statusEl.innerText = `✅ 所有檔案轉換完成！`;
            loader.style.display = 'none';
            setTimeout(() => { uploadArea.style.display = 'block'; progressBar.style.display = 'none'; statusEl.innerText = ''; }, 3000);
        });
    </script>
</body>
</html>
