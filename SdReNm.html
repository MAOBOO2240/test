<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貼圖轉換所：APNG to GIF</title>
    <script src="https://cdn.jsdelivr.net/npm/apng-js@1.1.1/dist/apng-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f5f7; color: #333; max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { color: #00c300; text-align: center; }
        .upload-area { border: 2px dashed #00c300; border-radius: 10px; padding: 40px; text-align: center; background-color: #fff; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .upload-area:hover { background-color: #e6ffe6; }
        #fileInput { display: none; }
        .status { text-align: center; font-weight: bold; margin-bottom: 20px; color: #555; }
        .gallery { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .card { background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; width: 120px; }
        .card img { max-width: 100px; max-height: 100px; }
        .card a { display: block; margin-top: 10px; background: #4b4b4b; color: #fff; text-decoration: none; padding: 5px; border-radius: 4px; font-size: 12px; }
        .card a:hover { background: #333; }
    </style>
</head>
<body>

    <h1>🚀 貼圖轉換所 (APNG 轉 GIF)</h1>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <h2>點擊或拖曳貼圖 (APNG) 到這裡</h2>
        <p>支援一次選取多張檔案批次轉換</p>
        <input type="file" id="fileInput" multiple accept=".png">
    </div>

    <div class="status" id="statusText">等待上傳檔案...</div>
    <div class="gallery" id="gallery"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const statusText = document.getElementById('statusText');
        const gallery = document.getElementById('gallery');

        // 監聽檔案上傳
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            gallery.innerHTML = '';
            let completed = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                statusText.innerText = `正在轉換: ${i + 1} / ${files.length} (${file.name})...`;
                await convertToGif(file);
                completed++;
            }
            statusText.innerText = `🎉 轉換完成！共轉換 ${completed} 張圖片。`;
        });

        async function convertToGif(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const buffer = e.target.result;
                    
                    // 1. 使用 apng-js 解析 APNG
                    const apng = window.apngjs.parseAPNG(buffer);
                    if (apng instanceof Error || !apng.playTime) {
                        console.log(`[跳過] ${file.name} 不是動態 APNG`);
                        resolve();
                        return;
                    }

                    await apng.createImages();
                    
                    // 2. 設定 gif.js 轉換器 (需要呼叫旁邊的 worker 檔案)
                    const gif = new GIF({
                        workers: 2,
                        quality: 10,
                        workerScript: 'gif.worker.js', // 關鍵：指向背景執行緒檔案
                        transparent: 'rgba(0,0,0,0)' // 嘗試處理透明背景
                    });

                    // 建立一個暫存的畫布來繪製每一幀
                    const canvas = document.createElement('canvas');
                    canvas.width = apng.width;
                    canvas.height = apng.height;
                    const ctx = canvas.getContext('2d');

                    // 3. 把 APNG 的影格一張張塞給 GIF
                    apng.frames.forEach(frame => {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(frame.imageElement, frame.left, frame.top);
                        gif.addFrame(ctx, {copy: true, delay: frame.delay});
                    });

                    // 4. 轉換完成後的動作
                    gif.on('finished', function(blob) {
                        const gifUrl = URL.createObjectURL(blob);
                        const originalName = file.name.replace('.png', '');
                        
                        // 建立下載卡片
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <img src="${gifUrl}" alt="${originalName}">
                            <a href="${gifUrl}" download="${originalName}.gif">下載 GIF</a>
                        `;
                        gallery.appendChild(card);
                        resolve();
                    });

                    // 開始壓製
                    gif.render();
                };
                reader.readAsArrayBuffer(file);
            });
        }
    </script>
</body>
</html>
