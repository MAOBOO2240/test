<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貼圖自動轉換引擎 (Dark Mode)</title>
    <script src="https://cdn.jsdelivr.net/npm/apng-js@1.1.1/dist/apng-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --line-green: #00c300;
            --accent-gray: #333333;
        }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container { 
            background: var(--container-bg); 
            padding: 50px; 
            border-radius: 12px; 
            width: 90%;
            max-width: 500px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #2a2a2a;
            text-align: center;
        }
        h1 { color: var(--line-green); margin-bottom: 10px; font-size: 24px; }
        .spinner { 
            border: 4px solid rgba(255,255,255,0.1); 
            border-top: 4px solid var(--line-green); 
            border-radius: 50%; 
            width: 50px; height: 50px; 
            animation: spin 1s linear infinite; 
            margin: 30px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 16px; line-height: 1.6; color: #b0b0b0; }
        .progress-bar {
            width: 100%;
            background: var(--accent-gray);
            height: 8px;
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
        }
        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--line-green);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 自動轉檔引擎正在運行</h1>
        <div class="spinner"></div>
        <div id="status">準備接收來自 LINE Store 的任務...</div>
        <div class="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>
</body>
</html>
